<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Cat</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }

    #cat-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    #cat {
      flex: none;
      position: relative;
      pointer-events: auto;
      cursor: pointer;
      transform-origin: center;
    }

    .cat-frame {
      position: absolute;
      inset: 0;
      background-image: url("./assets/cat/cat-spritesheet.png");
      background-repeat: no-repeat;
      image-rendering: pixelated;
      pointer-events: none;
    }

    #state-label {
      display: none;
      margin-top: 4px;
      padding: 2px 6px;
      border-radius: 8px;
      color: #111;
      background: rgba(255, 255, 255, 0.85);
      font: 12px Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="cat-wrapper">
    <div id="cat" role="img" aria-label="Virtual cat">
      <div id="cat-frame" class="cat-frame"></div>
    </div>
    <div id="state-label">idle</div>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
