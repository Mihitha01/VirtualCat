<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Virtual Cat</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #cat-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #cat {
      width: 120px;
      height: 120px;
      object-fit: contain;
      image-rendering: pixelated;
      user-select: none;
      pointer-events: none;
      transition: transform 0.15s ease;
    }

    #cat.idle {
      transform: scale(1);
    }

    #cat.walking {
      transform: scale(1.08);
    }

    #cat.running {
      transform: scale(1.18);
    }

    #state-label {
      margin-top: 8px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: black;
      background: white;
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="cat-wrapper">
    <img id="cat" class="idle" src="./assets/cat/idle.png" />
    <div id="state-label">idle</div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
